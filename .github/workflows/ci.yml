name: CI

on:
  push:
    branches: ["claude/swarm-50-agent-architecture-3l6cno", "feat/*"]
  pull_request:
    branches: ["claude/swarm-50-agent-architecture-3l6cno"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  nextjs-build:
    name: Next.js Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js app
        run: npm run build

  python-engines:
    name: Python Engine Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pytest pytest-cov crewai langchain-anthropic anthropic
      - name: Validate all engines
        run: |
          for engine in swarm/intelligence/*.py; do
            echo "Testing $engine..."
            python3 "$engine"
          done
      - name: Run swarm tests
        run: cd swarm && pytest tests/ -v --tb=short --cov=. --cov-report=term-missing 2>&1 | head -200

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [lint-type, python-engines]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python3 tests/e2e/test_engine_smoke.py --offline
