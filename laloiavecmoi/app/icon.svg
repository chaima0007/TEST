<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="La loi avec moi">
  <defs>
    <linearGradient id="llamGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
  </defs>

  <!-- Badge -->
  <rect x="3" y="3" width="90" height="90" rx="22" fill="url(#llamGrad)"/>
  <rect x="3" y="3" width="90" height="90" rx="22" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Bulle (pivot) = le droit expliqué, le dialogue -->
  <path d="M42 25 h12 a4 4 0 0 1 4 4 v4 a4 4 0 0 1 -4 4 h-4 l-4 4 v-4 h-4 a4 4 0 0 1 -4 -4 v-4 a4 4 0 0 1 4 -4 Z" fill="#ffffff"/>

  <!-- Mât central -->
  <rect x="46.3" y="39" width="3.4" height="32" rx="1.7" fill="#ffffff"/>

  <!-- Fléau (barre horizontale) -->
  <rect x="22" y="44.5" width="52" height="3.2" rx="1.6" fill="#ffffff"/>

  <!-- Chaînes -->
  <path d="M28 46l-6 12M28 46l6 12" stroke="rgba(255,255,255,0.85)" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M68 46l-6 12M68 46l6 12" stroke="rgba(255,255,255,0.85)" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Plateaux -->
  <path d="M19 58a9 9 0 0 0 18 0Z" fill="#ffffff"/>
  <path d="M59 58a9 9 0 0 0 18 0Z" fill="#ffffff"/>

  <!-- Socle -->
